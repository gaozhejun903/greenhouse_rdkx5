slam_toolbox:
  ros__parameters:
    use_sim_time: false
    odom_frame: odom
    map_frame: map
    base_frame: base_link
    scan_topic: /scan
    mode: mapping

    # laser
    max_laser_range: 8.0
    minimum_laser_range: 0.05
    minimum_time_interval: 0.01
    transform_timeout: 1.0
    tf_buffer_duration: 30.0

    # resolution
    resolution: 0.05
    max_correction_delta: 0.2
    max_correction_angle: 0.157

    # loop closure
    loop_closing: true
    loop_detection: true
